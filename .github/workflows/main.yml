# ৭. ডাইনামিকালি প্রোজেক্টের নাম খুঁজে বের করা এবং কম্পাইল করা
      - name: Compile and Build Archive (.xcarchive)
        run: |
          # রানারের ডিরেক্টরিতে থাকা .xcodeproj ফাইলের আসল নামটি খুঁজে বের করা
          PROJECT_FILE=$(basename $(find . -name "*.xcodeproj" -maxdepth 2 | head -n 1))
          echo "Found Project: $PROJECT_FILE"
          
          # এক্সকোড প্রজেক্টের নাম থেকে এক্সটেনশন বাদ দিয়ে স্কিম নেম বের করা
          SCHEME_NAME=$(basename "$PROJECT_FILE" .xcodeproj)
          echo "Using Scheme: $SCHEME_NAME"

          # আর্কাইভ ডিরেক্টরি তৈরি
          mkdir -p build

          # মূল কম্পাইলেশন কমান্ড
          xcodebuild archive \
            -project "$PROJECT_FILE" \
            -scheme "Unity-iPhone" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "build/GTA5Clone.xcarchive" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ৮. কম্পাইলড ফাইলকে .ipa ফরম্যাটে কনভার্ট করা
      - name: Export Archive to IPA Package
        run: |
          mkdir -p build/Payload
          
          # আর্কাইভ তৈরি হয়েছে কিনা চেক করা এবং ফাইল কপি করা
          if [ -d "build/GTA5Clone.xcarchive/Products/Applications" ]; then
            cp -r build/GTA5Clone.xcarchive/Products/Applications/*.app build/Payload/
            cd build
            zip -r GTA5Clone.ipa Payload
            echo "IPA generation completed successfully!"
          else
            echo "Error: Archive build failed, no .app file found!"
            exit 1
          fi
