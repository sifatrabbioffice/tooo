name: iOS GTA5 Clone Build and Compile

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ১. রিপোজিটরির কোড রানারে ডাউনলোড করা
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # ২. যদি কোনো ফাইল জিপ (.zip) অবস্থায় থাকে, তবে তা আনজিপ করা
      - name: Auto Unzip Project Files (If zipped)
        run: |
          echo "Checking for any zipped project files..."
          find . -name "*.zip" -exec unzip -o {} \; || true
          echo "Current directory contents:"
          ls -R

      # ৩. এক্সকোড (Xcode) রানার সিলেক্ট করা
      - name: Force Select Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      # ৪. কোকোয়াপডস (Cocoapods) এবং ডিপেন্ডেন্সি ইনস্টল
      - name: Install Cocoapods and Build Dependencies
        run: |
          sudo gem install cocoapods
          PODFILE_PATH=$(find . -name "Podfile" -print -quit)
          if [ ! -z "$PODFILE_PATH" ]; then
            cd "$(dirname "$PODFILE_PATH")"
            pod install
            cd -
          fi

      # ৫. গভীরভাবে প্রোজেক্টের নাম খুঁজে বের করা এবং কম্পাইল করা
      - name: Compile and Build Archive (.xcarchive)
        run: |
          # পুরো রানারের সব ফোল্ডার চেক করে .xcodeproj ফাইলের পাথ বের করা
          PROJECT_PATH=$(find . -name "*.xcodeproj" -print -quit)
          
          if [ -z "$PROJECT_PATH" ]; then
            echo "❌ Error: কোন .xcodeproj ফাইল বা ফোল্ডার খুঁজে পাওয়া যায়নি!"
            echo "অনুগ্রহ করে নিশ্চিত করুন যে আপনার Unity iOS Build-এর ফাইলগুলো সরাসরি GitHub-এ আপলোড করা হয়েছে।"
            exit 1
          fi
          
          echo "✅ Found Project Path: $PROJECT_PATH"
          
          # প্রজেক্ট ফাইলের মূল ডিরেক্টরিতে যাওয়া
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          PROJECT_FILE=$(basename "$PROJECT_PATH")
          
          echo "Project Directory: $PROJECT_DIR"
          echo "Project File Name: $PROJECT_FILE"
          
          # কোড সাইনিং বাইপাস করা (সিলিং/সাইডলোডের জন্য)
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES/CODE_SIGNING_ALLOWED = NO/g' "$PROJECT_PATH/project.pbxproj" || true
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PROJECT_PATH/project.pbxproj" || true

          # বিল্ড আউটপুট ডিরেক্টরি তৈরি
          mkdir -p $GITHUB_WORKSPACE/build

          # মূল কম্পাইলেশন কমান্ড (Unity-iPhone স্কিম দিয়ে বিল্ড হবে)
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "Unity-iPhone" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$GITHUB_WORKSPACE/build/GTA5Clone.xcarchive" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ৬. কম্পাইলড ফাইলকে .ipa ফরম্যাটে কনভার্ট করা
      - name: Export Archive to IPA Package
        run: |
          mkdir -p $GITHUB_WORKSPACE/build/Payload
          
          # আর্কাইভ ঠিকঠak তৈরি হয়েছে কিনা চেক করে .app ফাইল কপি করা
          if [ -d "$GITHUB_WORKSPACE/build/GTA5Clone.xcarchive/Products/Applications" ]; then
            cp -r $GITHUB_WORKSPACE/build/GTA5Clone.xcarchive/Products/Applications/*.app $GITHUB_WORKSPACE/build/Payload/
            cd $GITHUB_WORKSPACE/build
            zip -r GTA5Clone.ipa Payload
            echo "✅ IPA package successfully generated!"
          else
            echo "❌ Error: Archive build failed, no .app file found!"
            exit 1
          fi

      # ৭. তৈরি হওয়া .ipa ফাইলটি গিটহাবে আপলোড করা
      - name: Upload Output IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GTA5-iOS-Sideload-IPA
          path: build/GTA5Clone.ipa
          retention-days: 7
